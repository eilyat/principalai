media:
  input: src/images
  output: /
content:
  - name: resources
    label: Resources
    type: collection
    path: src/content/resources
    view:
      fields: [title, type, pubDate]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: type, label: Type, type: string, hidden: true, default: "Resource" }
      - { name: description, label: Description, type: string }
      - { name: authors, label: Authors, type: string, list: true }
      - { name: heroImage, label: Hero Image, type: string }
      - { name: cardImage, label: Card Image, type: string }
      - { name: iframe, label: Iframe, type: string }
      - { name: downloadPdf, label: Download PDF, type: string }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: pubDate, label: Pub Date, type: date, required: true }

  - name: articles
    label: Articles
    type: collection
    path: src/content/articles
    view:
      fields: [title, type, pubDate]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: type, label: Type, type: string, hidden: true, default: "Article" }
      - { name: description, label: Description, type: string }
      - { name: authors, label: Authors, type: string, list: true }
      - { name: heroImage, label: Hero Image, type: string }
      - { name: cardImage, label: Card Image, type: string }
      - { name: downloadPdf, label: Download PDF, type: string }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: tagline, label: Tagline, type: string, required: true }
      - { name: pubDate, label: Pub Date, type: date, required: true }

  - name: publications
    label: Publications
    type: collection
    path: src/content/publications
    view:
      fields: [title, type, pubDate]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: type, label: Type, type: string, hidden: true, default: "Publication" }
      - { name: tagline, label: Tagline, type: string, required: true }
      - { name: description, label: Description, type: string }
      - { name: pubDate, label: Pub Date, type: date, required: true }
      - { name: authors, label: Authors, type: string, list: true }
      - { name: heroImage, label: Hero Image, type: string }
      - { name: cardImage, label: Card Image, type: string }
      - { name: downloadPdf, label: Download PDF, type: string }

  - name: industries
    label: Industries
    type: collection
    path: src/content/industries
    view:
      fields: [title, navDesc, cardSummary]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: navDesc, label: Nav Description, type: string, required: true }
      - { name: description, label: Description, type: string, required: true }
      - { name: cardSummary, label: Card Summary, type: string, required: true }
      - { name: cardImage, label: Card Image, type: string }
      - { name: bannerImage, label: Banner Image, type: string }
      - { name: tags, label: Tags, type: string, list: true }

  - name: capabilities
    label: Capabilities
    type: collection
    path: src/content/capabilities
    view:
      fields: [title, navDesc, description]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: navDesc, label: Nav Description, type: string, required: true }
      - { name: description, label: Description, type: string, required: true }
      - { name: cardSummary, label: Card Summary, type: string }
      - { name: cardImage, label: Card Image, type: string }
      - { name: bannerImage, label: Banner Image, type: string }
      - { name: tags, label: Tags, type: string, list: true }

  - name: team
    label: Team
    type: collection
    path: src/content/team
    view:
      fields: [name, role, email]
    fields:
      - { name: name, label: Name, type: string, required: true }
      - { name: photo, label: Photo, type: string, required: true }
      - { name: shortName, label: Short Name, type: string, required: true }
      - { name: joinDate, label: Join Date, type: date }
      - { name: role, label: Role, type: string, required: true }
      - { name: location, label: Location, type: string, required: true }
      - { name: phone, label: Phone, type: string }
      - { name: email, label: Email, type: string, required: true }
      - { name: qualification, label: Qualification, type: string }
      - { name: linkedIn, label: LinkedIn, type: string }
      - { name: orcid, label: ORCID, type: string }
      - { name: ssrn, label: SSRN, type: string }